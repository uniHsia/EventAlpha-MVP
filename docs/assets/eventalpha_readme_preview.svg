  <rect x="669" y="420" width="100" height="20" rx="10" fill="#FFF3DF"/>
  <text x="682" y="435" font-family="Inter, Microsoft YaHei, Arial" font-size="12" font-weight="700" fill="#B56B00">规则校准</text>

  <rect x="825" y="334" width="295" height="116" rx="18" fill="#FFFFFF" stroke="#E4ECF7"/>
