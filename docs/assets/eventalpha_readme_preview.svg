<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF4FF"/>
      <stop offset="0.52" stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EEF7FF"/>
    </linearGradient>
    <linearGradient id="nav" x1="0" y1="0" x2="0" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1F44"/>
      <stop offset="1" stop-color="#082A5F"/>
    </linearGradient>
    <linearGradient id="hero" x1="285" y1="82" x2="1088" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B72FF"/>
      <stop offset="1" stop-color="#19C6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0B2B5E" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 34px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #F8FBFF; }
      .subtitle { font: 400 18px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #DCEEFF; }
      .navText { font: 500 17px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #C9D8F2; }
      .navActive { font: 700 17px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #FFFFFF; }
      .cardTitle { font: 700 18px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #12213D; }
      .cardText { font: 400 14px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #61708D; }
      .metric { font: 800 28px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #172B4D; }
      .chip { font: 700 12px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #0B63CE; }
      .small { font: 500 12px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #71819E; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="664" rx="30" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="28" y="28" width="222" height="664" rx="30" fill="url(#nav)"/>
  <circle cx="72" cy="82" r="21" fill="#19C6FF"/>
  <text x="65" y="90" font-family="Inter, Microsoft YaHei, Arial" font-size="24" font-weight="900" fill="#FFFFFF">E</text>
  <text x="106" y="78" font-family="Inter, Microsoft YaHei, Arial" font-size="23" font-weight="800" fill="#FFFFFF">EventAlpha</text>
  <text x="106" y="101" font-family="Inter, Microsoft YaHei, Arial" font-size="12" font-weight="500" fill="#9DB8E8">AI 投研 Agent</text>

  <rect x="50" y="145" width="176" height="42" rx="12" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="72" y="172" class="navActive">首页总览</text>
  <text x="72" y="226" class="navText">事件中心</text>
  <text x="72" y="274" class="navText">每日简报</text>
