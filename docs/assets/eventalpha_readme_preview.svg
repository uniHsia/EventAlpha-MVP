  <rect x="715" y="476" width="405" height="164" rx="22" fill="#FFFFFF" stroke="#E4ECF7"/>
  <text x="745" y="513" class="cardTitle">因果链影响分析</text>
  <rect x="745" y="548" width="72" height="44" rx="13" fill="#F2F7FF"/>
