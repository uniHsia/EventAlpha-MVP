  <path d="M919 247L872 294" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <path d="M886 236L927 201L958 219L1015 170" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

